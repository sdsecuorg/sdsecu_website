<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SdSecu - Scoreboard</title>
    <link rel="stylesheet" href="static/css/stylesheet.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div id="header-placeholder"></div>
        <hr>

        <div class="body">
            <h2><a href="#scoreboard">#</a> Scoreboards du Club</h2>
            <p>Mise à jour automatique des performances sur Root-Me et TryHackMe.</p>
            <hr>

            <h3> Classement Root-Me</h3>
            <div class="card">
                <div class="card-body">
                    <table style="width: 100%; border-collapse: collapse; font-family: 'Space Mono', monospace; text-align: left;">
                        <thead>
                            <tr style="border-bottom: 2px solid #f39c12;">
                                <th style="padding: 10px;">Rang</th>
                                <th style="padding: 10px;">Pseudo</th>
                                <th style="padding: 10px;">Points</th>
                                <th style="padding: 10px;">Rang Global</th>
                            </tr>
                        </thead>
                        <tbody id="rootme-tbody">
                            </tbody>
                    </table>
                </div>
            </div>

            <br><br>

            <h3>Classement TryHackMe</h3>
            <div class="card">
                <div class="card-body">
                    <table style="width: 100%; border-collapse: collapse; font-family: 'Space Mono', monospace; text-align: left;">
                        <thead>
                            <tr style="border-bottom: 2px solid #cc0000;">
                                <th style="padding: 10px;">Rang</th>
                                <th style="padding: 10px;">Pseudo</th>
                                <th style="padding: 10px;">Points THM</th>
                                <th style="padding: 10px;">Niveau</th>
                            </tr>
                        </thead>
                        <tbody id="thm-tbody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="footer-placeholder"></div>
    </div>

    <script>
        // Charger le fichier JSON des utilisateurs
fetch('/static/js/scores.json')
    .then(response => response.json())
    .then(users => {
        
        // 1. CLASSEMENT ROOT-ME (On filtre ceux qui ont Root-Me et on trie par score)
        const rmTbody = document.getElementById('rootme-tbody');
        const rootmeUsers = users.filter(u => u.rootme);
        rootmeUsers.sort((a, b) => b.rootme.score - a.rootme.score);

        if (rootmeUsers.length === 0) {
            rmTbody.innerHTML = '<tr><td colspan="4" style="padding:10px;text-align:center;">Aucun joueur.</td></tr>';
        } else {
            rootmeUsers.forEach((user, index) => {
                rmTbody.innerHTML += `
                    <tr style="border-bottom: 1px solid #333;">
                        <td style="padding: 10px; font-weight: bold;">#${index + 1}</td>
                        <td style="padding: 10px;">${user.pseudo}</td>
                        <td style="padding: 10px; color: #f39c12;">${user.rootme.score} pts</td>
                        <td style="padding: 10px; color: #bbb;">${user.rootme.position}</td>
                    </tr>`;
            });
        }

        // 2. CLASSEMENT TRYHACKME (On filtre ceux qui ont THM et on trie par score)
        const thmTbody = document.getElementById('thm-tbody');
        const thmUsers = users.filter(u => u.thm);
        thmUsers.sort((a, b) => b.thm.score - a.thm.score);

        if (thmUsers.length === 0) {
            thmTbody.innerHTML = '<tr><td colspan="4" style="padding:10px;text-align:center;">Aucun joueur.</td></tr>';
        } else {
            thmUsers.forEach((user, index) => {
                thmTbody.innerHTML += `
                    <tr style="border-bottom: 1px solid #333;">
                        <td style="padding: 10px; font-weight: bold;">#${index + 1}</td>
                        <td style="padding: 10px;">${user.pseudo}</td>
                        <td style="padding: 10px; color: #cc0000;">${user.thm.score} pts</td>
                        <td style="padding: 10px;">🏆 ${user.thm.level}</td>
                    </tr>`;
            });
        }
    })
    .catch(err => {
        console.error("Erreur de chargement des scores:", err);
        document.getElementById('rootme-tbody').innerHTML = '<tr><td colspan="4" style="color:red;padding:10px;">Erreur.</td></tr>';
        document.getElementById('thm-tbody').innerHTML = '<tr><td colspan="4" style="color:red;padding:10px;">Erreur.</td></tr>';
    });
    </script>
</body>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="static/js/script.js"></script>
</html>
