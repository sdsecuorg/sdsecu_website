<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SdSecu - Scoreboard</title>
    <link rel="stylesheet" href="static/css/stylesheet.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 10px 0;
        }
        .table-wrapper table {
            min-width: 500px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="header-placeholder"></div>
        <hr>

        <div class="body">
            <h2><a href="#scoreboard">#</a> Scoreboards du Club</h2>
            <p>Classement manuel des performances des membres du club.</p>
            <hr>

            <h3 style="display: flex; align-items: center; gap: 10px;">
                <img src="static/img/rootme.svg" style="width: 30px; height: 30px; filter: brightness(0) invert(1);" alt="">
                Classement Root-Me
            </h3>
            <div class="card">
                <div class="card-body">
                    <div class="table-wrapper">
                        <table style="width: 100%; border-collapse: collapse; font-family: 'Space Mono', monospace; text-align: left;">
                            <thead>
                                <tr style="border-bottom: 2px solid #f39c12;">
                                    <th style="padding: 10px;">Rang</th>
                                    <th style="padding: 10px;">Pseudo</th>
                                    <th style="padding: 10px;">Points</th>
                                    <th style="padding: 10px;">Rang Global</th>
                                    <th style="padding: 10px;">Top Mondial (%)</th>
                                </tr>
                            </thead>
                            <tbody id="rootme-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <br><br>

            <h3 style="display: flex; align-items: center; gap: 10px;">
                <img src="static/img/tryhackme.svg" style="width: 30px; height: 30px; filter: brightness(0) invert(1);" alt="">
                Classement TryHackMe
            </h3>
            <div class="card">
                <div class="card-body">
                    <div class="table-wrapper">
                        <table style="width: 100%; border-collapse: collapse; font-family: 'Space Mono', monospace; text-align: left;">
                            <thead>
                                <tr style="border-bottom: 2px solid #cc0000;">
                                    <th style="padding: 10px;">Rang</th>
                                    <th style="padding: 10px;">Pseudo</th>
                                    <th style="padding: 10px;">Points THM</th>
                                    <th style="padding: 10px;">Niveau</th>
                                    <th style="padding: 10px;">Top Mondial (%)</th>
                                </tr>
                            </thead>
                            <tbody id="thm-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div id="footer-placeholder"></div>
    </div>

    <script>
        fetch('/static/js/scores.json')
            .then(response => response.json())
            .then(users => {
                // 1. Remplir et trier Root-Me
                const rmTbody = document.getElementById('rootme-tbody');
                const rootmeUsers = users.filter(u => u.rootme);
                rootmeUsers.sort((a, b) => b.rootme.score - a.rootme.score);

                if (rootmeUsers.length === 0) {
                    rmTbody.innerHTML = '<tr><td colspan="5" style="padding:10px;text-align:center;">Aucun joueur.</td></tr>';
                } else {
                    rootmeUsers.forEach((user, index) => {
                        const rmPercent = user.rootme.percent ? user.rootme.percent : "N/A";
                        rmTbody.innerHTML += `
                            <tr style="border-bottom: 1px solid #333;">
                                <td data-label="Rang" style="padding: 10px; font-weight: bold;">#${index + 1}</td>
                                <td data-label="Pseudo" style="padding: 10px;">${user.pseudo}</td>
                                <td data-label="Points" style="padding: 10px; color: #f39c12;">${user.rootme.score} pts</td>
                                <td data-label="Rang Global" style="padding: 10px; color: #bbb;">${user.rootme.position}</td>
                                <td data-label="Top %" style="padding: 10px; color: #2ecc71; font-weight: bold;">${rmPercent}</td>
                            </tr>`;
                    });
                }

                // 2. Remplir et trier TryHackMe
                const thmTbody = document.getElementById('thm-tbody');
                const thmUsers = users.filter(u => u.thm);
                thmUsers.sort((a, b) => b.thm.score - a.thm.score);

                if (thmUsers.length === 0) {
                    thmTbody.innerHTML = '<tr><td colspan="5" style="padding:10px;text-align:center;">Aucun joueur.</td></tr>';
                } else {
                    thmUsers.forEach((user, index) => {
                        const thmPercent = user.thm.percent ? user.thm.percent : "N/A";
                        thmTbody.innerHTML += `
                            <tr style="border-bottom: 1px solid #333;">
                                <td data-label="Rang" style="padding: 10px; font-weight: bold;">#${index + 1}</td>
                                <td data-label="Pseudo" style="padding: 10px;">${user.pseudo}</td>
                                <td data-label="Points THM" style="padding: 10px; color: #cc0000;">${user.thm.score} pts</td>
                                <td data-label="Niveau" style="padding: 10px;">🏆 ${user.thm.level}</td>
                                <td data-label="Top %" style="padding: 10px; color: #2ecc71; font-weight: bold;">${thmPercent}</td>
                            </tr>`;
                    });
                }
            })
            .catch(err => {
                console.error("Erreur de chargement des scores:", err);
            });
    </script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="static/js/script.js"></script>
</body>
</html>
